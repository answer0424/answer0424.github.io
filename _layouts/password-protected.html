---
layout: default
---

<div id="protected-content" 
     class="protected-content-wrapper"
     data-password-protected="{{ page.password_protected | default: false }}"
     data-password-hash="{{ page.password_hash }}"
     data-encrypted="{{ page.encrypted_content }}">
  <!-- 콘텐츠가 여기에 동적으로 로드됩니다 -->
</div>

<script src="{{ '/assets/js/crypto-js.min.js' | relative_url }}"></script>
<script src="{{ '/_javascript/modules/password-protected.js' | relative_url }}"></script>

<style>
.password-form-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 60vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.password-form {
  background: white;
  padding: 40px;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
  max-width: 400px;
  width: 100%;
  text-align: center;
}

.password-form-icon {
  font-size: 48px;
  margin-bottom: 20px;
}

.password-form h2 {
  margin: 20px 0;
  color: #333;
}

.password-form p {
  color: #666;
  margin-bottom: 30px;
  font-size: 14px;
}

.password-form form {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.password-form input {
  padding: 12px;
  border: 2px solid #ddd;
  border-radius: 5px;
  font-size: 16px;
  transition: border-color 0.3s;
}

.password-form input:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.password-form button {
  padding: 12px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s;
}

.password-form button:hover {
  transform: translateY(-2px);
}

.password-form button:active {
  transform: translateY(0);
}

.password-error {
  color: #e74c3c;
  font-size: 14px;
  margin-top: 10px;
  display: none;
}

/* 비밀번호 제거 버튼 (선택사항) */
.logout-button {
  display: inline-block;
  margin-top: 20px;
  padding: 8px 16px;
  background: #e74c3c;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
}

.logout-button:hover {
  background: #c0392b;
}
</style>
